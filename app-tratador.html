<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Meta Gestão — Tratador</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}:root{--bg:#f4f6f9;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--dim:#94a3b8;--G:#15803d;--GD:#052e16;--GM:#16a34a;--GL:#f0fdf4;--yellow:#d97706;--red:#dc2626;--blue:#2563eb;--shadow:0 1px 4px rgba(0,0,0,.07);--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}html,body{height:100%;background:var(--bg);font-family:Inter,sans-serif;color:var(--text);overscroll-behavior:none}#app{display:flex;flex-direction:column;height:100vh;max-width:520px;margin:0 auto;background:var(--bg)}.screen{display:none;flex:1;overflow-y:auto;padding:20px 18px calc(24px + var(--safe-bot))}.screen.active{display:flex;flex-direction:column}.topbar{background:linear-gradient(135deg,var(--GD),var(--G));color:#fff;padding:calc(14px + var(--safe-top)) 18px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}.topbar-title{font-size:15px;font-weight:800;flex:1}.topbar-back{background:#ffffff26;border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer}.logo-wrap{text-align:center;margin:26px 0 8px}.logo-wrap h1{font-size:22px;font-weight:900;color:var(--GD)}.logo-wrap p{font-size:12px;color:var(--muted);margin-top:4px}.field{margin-bottom:14px}.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}.field input,.field select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:Inter,sans-serif;background:#fff;color:var(--text);outline:none}.field input:focus,.field select:focus{border-color:var(--G)}.btn{width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:Inter,sans-serif}.btn-primary{background:linear-gradient(135deg,var(--GM),var(--G));color:#fff;box-shadow:0 6px 16px #15803d4d}.btn-primary:active{transform:scale(.98)}.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text)}.err{color:var(--red);font-size:12px;font-weight:600;margin-top:10px;text-align:center;display:none}.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow)}.card:active{transform:scale(.98)}.card-title{font-size:14px;font-weight:800}.card-sub{font-size:11px;color:var(--muted);margin-top:2px}.readonly-box{background:var(--GL);border:1.5px solid #86efac;border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}.readonly-box .lbl{font-size:11px;font-weight:700;color:var(--G)}.readonly-box .val{font-size:18px;font-weight:900;color:var(--GD)}.preview{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin:14px 0}.preview-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px solid #f1f5f9}.preview-row:last-child{border-bottom:none}.preview-row .v{font-weight:800}.badge-ok{color:var(--G)}.badge-warn{color:var(--yellow)}.badge-bad{color:var(--red)}.hist-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12px}.hist-item .top{display:flex;justify-content:space-between;font-weight:700}.toast{position:fixed;bottom:calc(20px + var(--safe-bot));left:50%;transform:translate(-50%) translateY(100px);background:#1e293b;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 8px 24px #0000004d;transition:transform .25s;z-index:200;max-width:90%;text-align:center}.toast.show{transform:translate(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

  <!-- LOGIN -->
  <div class="screen active" id="screen-login">
    <div class="logo-wrap">
      <h1>🌾 Meta Gestão</h1>
      <p>App do Tratador — Monitoramento de Consumo</p>
    </div>
    <div class="field"><label>Seu nome</label><input id="login-nome" placeholder="Ex: Carlos"></div>
    <div class="field"><label>PIN de acesso</label><input id="login-pin" type="password" inputmode="numeric" maxlength="8" placeholder="••••"></div>
    <button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>
    <div class="err" id="login-erro"></div>
  </div>

  <!-- SELECIONAR FAZENDA -->
  <div class="screen" id="screen-fazenda">
    <div class="topbar"><div class="topbar-title">🏡 Selecione a Fazenda</div><button class="topbar-back" onclick="fazerLogout()">Sair</button></div>
    <div style="padding:16px" id="lista-fazendas"><div style="text-align:center;padding:30px;color:var(--muted)">Carregando...</div></div>
  </div>

  <!-- SELECIONAR LOTE -->
  <div class="screen" id="screen-lote">
    <div class="topbar"><button class="topbar-back" onclick="voltarFazendas()">◀</button><div class="topbar-title" id="lote-farm-nome">🐄 Selecione o Lote</div></div>
    <div style="padding:16px" id="lista-lotes"></div>
  </div>

  <!-- FORMULÁRIO DIÁRIO -->
  <div class="screen" id="screen-form">
    <div class="topbar"><button class="topbar-back" onclick="voltarLotes()">◀</button><div class="topbar-title" id="form-lote-nome">📋 Lançar Consumo</div></div>
    <div style="padding:16px">
      <div class="readonly-box">
        <span class="lbl">MS% da dieta (oferecido)</span>
        <span class="val" id="form-ms-oferecido">—</span>
      </div>
      <div class="field"><label>Data</label><input type="date" id="f-data"></div>
      <div class="field"><label>Nº de cabeças</label><input type="number" id="f-cabecas" inputmode="numeric" placeholder="Ex: 120" oninput="atualizarPreview()"></div>
      <div class="field"><label>Quantidade ofertada (kg)</label><input type="number" step="0.1" id="f-ofertado" inputmode="decimal" placeholder="Ex: 5000" oninput="atualizarPreview()"></div>
      <div class="field"><label>Quantidade de sobra (kg)</label><input type="number" step="0.1" id="f-sobra" inputmode="decimal" placeholder="Ex: 300" oninput="atualizarPreview()"></div>
      <div class="field"><label>MS% da sobra</label><input type="number" step="0.1" id="f-ms-sobra" inputmode="decimal" placeholder="Ex: 38" oninput="atualizarPreview()"></div>

      <div class="preview" id="preview-wrap" style="display:none">
        <div class="preview-row"><span>% de Sobra</span><span class="v" id="pv-pct-sobra">—</span></div>
        <div class="preview-row"><span>MS Ofertada</span><span class="v" id="pv-ms-ofertada">—</span></div>
        <div class="preview-row"><span>MS da Sobra</span><span class="v" id="pv-ms-sobra">—</span></div>
        <div class="preview-row"><span>MS Ingerida (total)</span><span class="v" id="pv-ms-ingerida">—</span></div>
        <div class="preview-row"><span>MS Ingerida / Animal</span><span class="v" id="pv-ms-animal">—</span></div>
      </div>

      <button class="btn btn-primary" onclick="salvarConsumo()" style="margin-top:6px">💾 Salvar Lançamento</button>
      <button class="btn btn-outline" onclick="verHistorico()" style="margin-top:10px">📁 Ver Últimos Lançamentos</button>
    </div>
  </div>

  <!-- HISTÓRICO -->
  <div class="screen" id="screen-historico">
    <div class="topbar"><button class="topbar-back" onclick="voltarForm()">◀</button><div class="topbar-title">📁 Últimos Lançamentos</div></div>
    <div style="padding:16px" id="lista-historico"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>const firebaseConfig={apiKey:"AIzaSyClpsHjO8OLThD--hDOfg7Fg3t6hhuM-To",authDomain:"meta-gestao-608d7.firebaseapp.com",databaseURL:"https://meta-gestao-608d7-default-rtdb.firebaseio.com",projectId:"meta-gestao-608d7",storageBucket:"meta-gestao-608d7.firebasestorage.app",messagingSenderId:"318618053627",appId:"1:318618053627:web:ae289200bd1e87be29395e"};firebase.initializeApp(firebaseConfig);const auth=firebase.auth();const db=firebase.database();const PIN_PADRAO="2026";let tratadorNome="";let farmAtual=null;let loteAtual=null;let lotesCache=[];let ultimoCalculo=null;function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2600)}function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active")}async function fazerLogin(){const nome=document.getElementById("login-nome").value.trim();const pin=document.getElementById("login-pin").value.trim();const erroEl=document.getElementById("login-erro");erroEl.style.display="none";if(!nome){erroEl.textContent="Digite seu nome.";erroEl.style.display="block";return}if(!pin){erroEl.textContent="Digite o PIN.";erroEl.style.display="block";return}try{if(!auth.currentUser)await auth.signInAnonymously();let pinValido=PIN_PADRAO;try{const snap=await db.ref("config/pin_tratador").once("value");if(snap.val())pinValido=String(snap.val())}catch(e){}if(pin!==pinValido){erroEl.textContent="PIN incorreto.";erroEl.style.display="block";return}tratadorNome=nome.toUpperCase();sessionStorage.setItem("tratador_nome",tratadorNome);carregarFazendas();showScreen("screen-fazenda")}catch(e){console.error(e);erroEl.textContent="Erro ao entrar: "+(e.message||"tente novamente");erroEl.style.display="block"}}function fazerLogout(){tratadorNome="";sessionStorage.removeItem("tratador_nome");document.getElementById("login-pin").value="";showScreen("screen-login")}async function carregarFazendas(){const wrap=document.getElementById("lista-fazendas");wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">Carregando...</div>';try{const snap=await db.ref("propriedades").once("value");const props=snap.val()||{};const ativos=Object.entries(props).map(([id,d])=>({id,...d})).filter(d=>(d.situacao||"").toUpperCase()==="ATIVO").sort((a,b)=>(a.produtor||"").localeCompare(b.produtor||""));if(!ativos.length){wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">Nenhuma fazenda ativa encontrada.</div>';return}wrap.innerHTML=ativos.map(d=>`<div class="card" onclick="selecionarFazenda('${d.id}','${(d.produtor||"").replace(/'/g,"\\'")}')">
      <div class="card-title">${d.produtor||"\u2014"}</div>
      <div class="card-sub">${d.cidade||""}</div>
    </div>`).join("")}catch(e){console.error(e);wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--red)">Erro ao carregar fazendas.</div>'}}function voltarFazendas(){showScreen("screen-fazenda")}async function selecionarFazenda(farmId,produtor){farmAtual={id:farmId,produtor};document.getElementById("lote-farm-nome").textContent="\u{1F404} "+produtor;const wrap=document.getElementById("lista-lotes");wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">Carregando lotes...</div>';showScreen("screen-lote");try{const snap=await db.ref("dietas/"+farmId+"/lotes").once("value");const lotes=snap.val()||{};lotesCache=Object.entries(lotes).map(([id,l])=>({id,...l}));if(!lotesCache.length){wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">Essa fazenda ainda n\xE3o tem lotes cadastrados em Dieta &amp; Custos. Pe\xE7a pro respons\xE1vel cadastrar primeiro.</div>';return}wrap.innerHTML=lotesCache.map(l=>`<div class="card" onclick="selecionarLote('${l.id}')">
      <div class="card-title">${l.nome||l.nomeDieta||"Lote"}</div>
      <div class="card-sub">${l.vacas||0} vacas \xB7 MS dieta: ${l.ms_dieta>0?l.ms_dieta+"%":"n\xE3o cadastrado"}</div>
    </div>`).join("")}catch(e){console.error(e);wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--red)">Erro ao carregar lotes.</div>'}}function voltarLotes(){showScreen("screen-lote")}function selecionarLote(loteId){loteAtual=lotesCache.find(l=>l.id===loteId);if(!loteAtual)return;document.getElementById("form-lote-nome").textContent="\u{1F4CB} "+(loteAtual.nome||loteAtual.nomeDieta||"Lote");document.getElementById("form-ms-oferecido").textContent=loteAtual.ms_dieta>0?loteAtual.ms_dieta+"%":"n\xE3o cadastrado";document.getElementById("f-data").value=new Date().toISOString().slice(0,10);document.getElementById("f-cabecas").value=loteAtual.vacas||"";document.getElementById("f-ofertado").value="";document.getElementById("f-sobra").value="";document.getElementById("f-ms-sobra").value="";document.getElementById("preview-wrap").style.display="none";showScreen("screen-form")}function calcularConsumo(){const cabecas=parseFloat(document.getElementById("f-cabecas").value)||0;const ofertado=parseFloat(document.getElementById("f-ofertado").value)||0;const sobra=parseFloat(document.getElementById("f-sobra").value)||0;const msSobraPct=parseFloat(document.getElementById("f-ms-sobra").value)||0;const msOfertadoPct=parseFloat(loteAtual?.ms_dieta)||0;if(!(ofertado>0)||!(cabecas>0))return null;const pctSobra=ofertado>0?sobra/ofertado*100:0;const msOfertadaKg=ofertado*msOfertadoPct/100;const msSobraKg=sobra*msSobraPct/100;const msIngeridaKg=Math.max(0,msOfertadaKg-msSobraKg);const msIngeridaAnimal=cabecas>0?msIngeridaKg/cabecas:0;return{cabecas,ofertado,sobra,msSobraPct,msOfertadoPct,pctSobra,msOfertadaKg,msSobraKg,msIngeridaKg,msIngeridaAnimal}}function atualizarPreview(){const r=calcularConsumo();const wrap=document.getElementById("preview-wrap");if(!r){wrap.style.display="none";ultimoCalculo=null;return}ultimoCalculo=r;wrap.style.display="block";const cls=r.pctSobra<2?"badge-bad":r.pctSobra<=10?"badge-ok":"badge-warn";document.getElementById("pv-pct-sobra").innerHTML=`<span class="${cls}">${r.pctSobra.toFixed(1)}%</span>`;document.getElementById("pv-ms-ofertada").textContent=r.msOfertadaKg.toFixed(1)+" kg";document.getElementById("pv-ms-sobra").textContent=r.msSobraKg.toFixed(1)+" kg";document.getElementById("pv-ms-ingerida").textContent=r.msIngeridaKg.toFixed(1)+" kg";document.getElementById("pv-ms-animal").textContent=r.msIngeridaAnimal.toFixed(1)+" kg"}async function salvarConsumo(){const r=calcularConsumo();if(!r){toast("\u274C Preencha cabe\xE7as e quantidade ofertada");return}if(!(r.msOfertadoPct>0)){const ok=confirm("O MS% da dieta oferecida n\xE3o est\xE1 cadastrado pra esse lote (fica em branco em Dieta & Custos no painel). Salvar mesmo assim, sem esse c\xE1lculo ficar completo?");if(!ok)return}const data=document.getElementById("f-data").value||new Date().toISOString().slice(0,10);const registro={data,cabecas:r.cabecas,ofertado:r.ofertado,sobra:r.sobra,ms_sobra_pct:r.msSobraPct,ms_oferecido_pct:r.msOfertadoPct,pct_sobra:+r.pctSobra.toFixed(2),ms_ofertada_kg:+r.msOfertadaKg.toFixed(2),ms_sobra_kg:+r.msSobraKg.toFixed(2),ms_ingerida_kg:+r.msIngeridaKg.toFixed(2),ms_ingerida_animal:+r.msIngeridaAnimal.toFixed(2),tratador:tratadorNome,salvo_em:new Date().toISOString()};try{await db.ref("consumo_ms/"+farmAtual.id+"/"+loteAtual.id).push(registro);toast("\u2705 Lan\xE7amento salvo!");document.getElementById("f-ofertado").value="";document.getElementById("f-sobra").value="";document.getElementById("f-ms-sobra").value="";document.getElementById("preview-wrap").style.display="none"}catch(e){console.error(e);toast("\u274C Erro ao salvar: "+e.message)}}async function verHistorico(){showScreen("screen-historico");const wrap=document.getElementById("lista-historico");wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">Carregando...</div>';try{const snap=await db.ref("consumo_ms/"+farmAtual.id+"/"+loteAtual.id).orderByChild("data").limitToLast(15).once("value");const registros=[];snap.forEach(c=>registros.push(c.val()));registros.reverse();if(!registros.length){wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">Nenhum lan\xE7amento ainda.</div>';return}wrap.innerHTML=registros.map(r=>`<div class="hist-item">
      <div class="top"><span>${r.data?new Date(r.data+"T12:00:00").toLocaleDateString("pt-BR"):"\u2014"}</span><span>${(r.pct_sobra||0).toFixed(1)}% sobra</span></div>
      <div style="color:var(--muted);margin-top:4px">${r.cabecas} cabe\xE7as \xB7 MS/animal: ${(r.ms_ingerida_animal||0).toFixed(1)} kg \xB7 ${r.tratador||"\u2014"}</div>
    </div>`).join("")}catch(e){console.error(e);wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--red)">Erro ao carregar hist\xF3rico.</div>'}}function voltarForm(){showScreen("screen-form")}(function iniciar(){const nomeSalvo=sessionStorage.getItem("tratador_nome");if(nomeSalvo){tratadorNome=nomeSalvo;auth.signInAnonymously().then(()=>{carregarFazendas();showScreen("screen-fazenda")}).catch(()=>showScreen("screen-login"))}})();
</script>
</body>
</html>
