<!-- O campo completo provavelmente se parece com isto:

<div class="form-group" style="margin-bottom:12px;">
  <label style="font-weight:600;color:#444;">NUL - Nitrogênio Ureico do Leite (mg/dL)</label>
  <input type="number" id="rel_nul" step="0.1" min="0" max="50"
    placeholder="Ref: 10-16 mg/dL"
    style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px;">
  <small style="color:#888;font-size:11px;">⚠️ Referência: 10–16 mg/dL. Abaixo = deficiência proteica. Acima = excesso de PDR.</small>
</div>

    rel_nul: document.getElementById('rel_nul')?.value || '',

// ALTERAÇÃO 2 — TROCA DE VENDEDOR NO PAINEL DE EDIÇÃO

// PASSO 2A: Encontre a função que ABRE o modal de edição
// Busque por: function abrirEdicao ou abrirModalPropriedade
// ou busque por: edit_vacas ou edit_litros
//
// Onde os campos são preenchidos, adicione:
// -------------------------------------------------------

// Exemplo de como preencher o select ao abrir:
function preencherVendedorEdicao(dadosPropriedade) {
  const sel = document.getElementById('edit_vendedor');
  if (sel && dadosPropriedade) {
    sel.value = dadosPropriedade.vendedor || '';
  }
}

// -------------------------------------------------------
// PASSO 2B: Encontre a função salvarEdicaoAdmin
// Onde os dados são coletados antes de salvar, adicione:
// -------------------------------------------------------

function coletarVendedorEdicao() {
  const sel = document.getElementById('edit_vendedor');
  return sel ? sel.value : '';
}

// No objeto que vai para o Firebase, inclua:
// vendedor: coletarVendedorEdicao(),
</script>
