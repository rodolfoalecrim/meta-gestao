<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f3f6f3;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--dim:#94a3b8;--G:#15803d;--GD:#052e16;--GM:#16a34a;--GL:#f0fdf4;--yellow:#d97706;--red:#dc2626;--blue:#2563eb;--shadow:0 2px 8px rgba(15,23,42,.06);--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh}
#loading-screen{position:fixed;inset:0;background:var(--GD);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
#erro-screen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:998;text-align:center}
#pin-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--GD),var(--G));display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:997}
.pin-box{background:#fff;border-radius:20px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px #0000004d;text-align:center}
.pin-title{font-size:19px;font-weight:800;color:var(--text);margin-bottom:6px}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.5}
.pin-input{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:16px;font-size:26px;text-align:center;letter-spacing:10px;font-family:'Inter',monospace;outline:none;margin-bottom:14px}
.pin-input:focus{border-color:var(--G)}
.btn-pin{width:100%;background:linear-gradient(135deg,var(--G),var(--GD));color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;font-family:Inter,sans-serif;cursor:pointer}
.pin-err{color:var(--red);font-size:12px;font-weight:600;margin-top:10px;min-height:16px}
#app{display:none;flex-direction:column;min-height:100dvh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 18px;height:60px;display:flex;align-items:center;gap:10px;flex-shrink:0;padding-top:var(--safe-top);box-shadow:0 1px 3px rgba(15,23,42,.04)}
.topbar-logo-img{height:32px;width:auto;object-fit:contain}
.topbar-title{font-size:12.5px;font-weight:700;color:var(--muted);background:var(--surface2);padding:5px 12px;border-radius:20px}
.topbar-logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:var(--GD)}
.content{flex:1;padding:16px 16px 40px;max-width:560px;margin:0 auto;width:100%}
.screen{display:none}
.screen.active{display:block;animation:screenIn .28s cubic-bezier(.16,1,.3,1)}
@keyframes screenIn{0%{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero-card{background:linear-gradient(135deg,var(--GD),var(--G) 70%,#22c55e);border-radius:20px;padding:24px;color:#fff;margin-bottom:16px;box-shadow:0 8px 24px rgba(5,46,22,.25);position:relative;overflow:hidden}
.hero-card:before{content:"";position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero-title{font-size:19px;font-weight:800}
.hero-sub{font-size:12px;opacity:.8;margin-top:3px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:box-shadow .2s ease,transform .2s ease}
.kpi-card:active{transform:scale(.97)}
.kpi-card:before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--kpi-color,var(--G))}
.kpi-icon{font-size:20px;margin-bottom:6px}
.kpi-val{font-size:24px;font-weight:900;color:var(--kpi-color,var(--text));line-height:1}
.kpi-lbl{font-size:11px;color:var(--muted);margin-top:4px;font-weight:600}
.qual-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow);margin-bottom:16px}
.qual-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.qual-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.qual-item{text-align:center}
.qual-val{font-size:19px;font-weight:900}
.qual-lbl{font-size:9.5px;color:var(--muted);margin-top:2px}
.visita-card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px}
.visita-hdr{background:var(--surface2);padding:12px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.visita-body{padding:14px 16px}
.visita-data{font-size:13px;font-weight:800;color:var(--text)}
.visita-tec{font-size:11px;color:var(--muted);margin-top:2px}
.visita-txt-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-top:12px;margin-bottom:4px}
.visita-txt{font-size:12.5px;color:var(--text);line-height:1.5;background:var(--surface2);border-radius:8px;padding:10px 12px}
.visita-acoes{color:#0891b2;font-weight:600}
.btn-action{width:100%;border:none;border-radius:14px;padding:15px;font-size:14px;font-weight:700;font-family:Inter,sans-serif;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,var(--G),var(--GD));color:#fff}
.btn-secondary{background:#fff;border:1.5px solid var(--border)!important;color:var(--text)}
.form-field{margin-bottom:14px}
.form-label{font-size:12.5px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px}
.form-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:Inter,sans-serif;outline:none;background:#fff;color:var(--text)}
.form-input:focus{border-color:var(--G)}
.form-section{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 10px}
.toast{position:fixed;bottom:30px;left:50%;transform:translate(-50%) translateY(20px);background:#1e293b;color:#fff;padding:11px 22px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translate(-50%) translateY(0)}
@keyframes spin{to{transform:rotate(360deg)}}
.mg-spinner{width:24px;height:24px;border:3px solid #e2e8f0;border-top-color:var(--G);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
button{transition:transform .12s ease}
button:active{transform:scale(.96)}
.bottom-nav{background:#fff;border-top:1.5px solid var(--border);display:flex;padding-bottom:var(--safe-bot);flex-shrink:0;position:sticky;bottom:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0;background:none;border:none;color:var(--muted);font-size:9.5px;font-family:Inter,sans-serif;cursor:pointer;font-weight:600}
.nav-btn.active{color:var(--GD)}
.nav-btn.active .ico{background:var(--GL);border-radius:10px;padding:2px 10px;transform:translateY(-1px)}
.nav-btn{transition:color .15s ease}
.nav-btn .ico{font-size:19px;line-height:1}
.chart-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:var(--shadow);margin-bottom:14px}
.rotate-hint{display:none;background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1.5px dashed #93c5fd;border-radius:14px;padding:16px;margin-bottom:14px;text-align:center;color:#1d4ed8;font-size:12.5px;font-weight:700}
.rotate-hint .ico{font-size:26px;display:block;margin-bottom:6px;animation:rotateHintPulse 1.8s ease-in-out infinite}
@keyframes rotateHintPulse{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-90deg)}}
@media (orientation:portrait){
  .tela-grafico-landscape .rotate-hint{display:block}
}
@media (orientation:landscape){
  .tela-grafico-landscape .content{max-width:920px}
  .tela-grafico-landscape .chart-card canvas{min-height:340px!important}
  .tela-grafico-landscape .bottom-nav{display:none}
  .tela-grafico-landscape .topbar{height:44px}
  body:has(.tela-grafico-landscape){padding-bottom:0}
}
.chart-card-title{font-size:12.5px;font-weight:800;margin-bottom:2px}
.chart-card-sub{font-size:10.5px;color:var(--muted);margin-bottom:10px;line-height:1.4}
</style>
</head>
<body>

<div id="loading-screen">
  <img src="meta_logo.jpg" alt="Meta Gestão" style="width:64px;height:64px;object-fit:contain;filter:brightness(0) invert(1);opacity:.95">
  <div style="color:white;font-size:15px;font-weight:700;margin-top:12px">Meta Gestão</div>
  <div style="color:rgba(255,255,255,.6);font-size:12px;margin-top:4px">Carregando...</div>
</div>

<div id="erro-screen">
  <div style="font-size:44px;margin-bottom:10px">🔒</div>
  <div style="font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px">Link inválido</div>
  <div style="font-size:13px;color:var(--muted);max-width:320px">Esse link de acesso não é válido ou expirou. Fale com seu técnico da Meta pra receber o link certo.</div>
</div>

<div id="pin-screen">
  <div class="pin-box">
    <img src="meta_logo.jpg" alt="Meta Gestão" style="width:56px;height:56px;object-fit:contain;margin-bottom:10px">
    <div class="pin-title" id="pin-farm-name">Sua Fazenda</div>
    <div class="pin-sub">Digite o PIN de 4 dígitos que seu técnico te passou</div>
    <input type="tel" inputmode="numeric" maxlength="4" class="pin-input" id="pin-input" placeholder="••••" autofocus>
    <button class="btn-pin" onclick="verificarPin()">Entrar</button>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <img src="meta_logo.jpg" alt="Meta Gestão" class="topbar-logo-img">
    <div class="topbar-logo">Meta Gestão</div>
    <div class="topbar-title" id="topbar-fazenda-nome" style="margin-left:auto"></div>
  </div>

  <div class="content">
    <!-- DASHBOARD -->
    <div class="screen active" id="screen-dash">
      <div id="dash-body"></div>
    </div>

    <!-- CONTROLE LEITEIRO -->
    <div class="screen tela-grafico-landscape" id="screen-leiteiro">
      <div id="leiteiro-body"></div>
    </div>

    <!-- DIETA & CUSTOS -->
    <div class="screen" id="screen-dieta">
      <div id="dieta-body"></div>
    </div>

    <!-- FINANCEIRO -->
    <div class="screen" id="screen-financeiro">
      <div id="financeiro-body"></div>
    </div>

    <!-- CONSUMO -->
    <div class="screen tela-grafico-landscape" id="screen-consumo">
      <div id="consumo-body"></div>
    </div>

    <!-- FORRAGEM -->
    <div class="screen" id="screen-forragem">
      <div id="forragem-body"></div>
    </div>

    <!-- QUALIDADE DA FORRAGEM -->
    <div class="screen" id="screen-bromatologia">
      <div id="bromatologia-body"></div>
    </div>

    <!-- EFICIÊNCIA REPRODUTIVA -->
    <div class="screen" id="screen-reproducao">
      <div id="reproducao-body"></div>
    </div>

    <!-- RECRIA -->
    <div class="screen" id="screen-recria">
      <div id="recria-body"></div>
    </div>

    <!-- MEU HISTÓRICO -->
    <div class="screen" id="screen-meuhistorico">
      <div id="meuhistorico-body"></div>
    </div>

    <!-- EVOLUÇÃO -->
    <div class="screen" id="screen-evolucao">
      <div id="evolucao-body"></div>
    </div>

    <!-- MAIS (menu) -->
    <div class="screen" id="screen-mais">
      <div id="mais-body"></div>
    </div>

    <!-- EDITAR -->
    <div class="screen" id="screen-edit">
      <div id="edit-body"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-dash" onclick="navScreen('dash')"><span class="ico">🏠</span>Início</button>
    <button class="nav-btn" id="nav-leiteiro" onclick="navScreen('leiteiro')"><span class="ico">🥛</span>Leiteiro</button>
    <button class="nav-btn" id="nav-dieta" onclick="navScreen('dieta')"><span class="ico">🌽</span>Dieta</button>
    <button class="nav-btn" id="nav-financeiro" onclick="navScreen('financeiro')"><span class="ico">💰</span>Financeiro</button>
    <button class="nav-btn" id="nav-mais" onclick="navScreen('mais')"><span class="ico">⋯</span>Mais</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const firebaseConfig={apiKey:"AIzaSyClpsHjO8OLThD--hDOfg7Fg3t6hhuM-To",authDomain:"meta-gestao-608d7.firebaseapp.com",databaseURL:"https://meta-gestao-608d7-default-rtdb.firebaseio.com",projectId:"meta-gestao-608d7",storageBucket:"meta-gestao-608d7.firebasestorage.app",messagingSenderId:"318618053627",appId:"1:318618053627:web:ae289200bd1e87be29395e"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const fns=firebase.app().functions("southamerica-east1");

let farmId=null;
let farmData=null;

function showToast(msg,err){const t=document.getElementById("toast");t.textContent=msg;t.style.background=err?"#dc2626":"#15803d";t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000)}

function getTokenFromUrl(){
  const params=new URLSearchParams(location.search);
  return params.get("f")||"";
}

async function iniciar(){
  let token=getTokenFromUrl();
  if(!token)token=localStorage.getItem("meta_produtor_token")||"";
  if(!token){mostrarErro();return}
  try{
    const snap=await db.ref("propriedades").orderByChild("produtor_token").equalTo(token).once("value");
    const val=snap.val();
    if(!val){mostrarErro();return}
    const keys=Object.keys(val);
    farmId=keys[0];
    farmData=val[farmId];
    localStorage.setItem("meta_produtor_token",token);
    document.getElementById("loading-screen").style.display="none";
    const jaVerificado=localStorage.getItem("meta_produtor_ok_"+farmId)==="1";
    if(jaVerificado){
      abrirApp();
    }else{
      document.getElementById("pin-farm-name").textContent=farmData.propriedade||farmData.produtor||"Sua Fazenda";
      document.getElementById("pin-screen").style.display="flex";
      document.getElementById("pin-input").focus();
    }
  }catch(e){
    console.error("Erro ao validar acesso:",e);
    mostrarErro();
  }
}

function mostrarErro(){
  document.getElementById("loading-screen").style.display="none";
  document.getElementById("erro-screen").style.display="flex";
}

function verificarPin(){
  const val=(document.getElementById("pin-input").value||"").trim();
  const errEl=document.getElementById("pin-err");
  if(val===String(farmData.produtor_pin||"")){
    localStorage.setItem("meta_produtor_ok_"+farmId,"1");
    document.getElementById("pin-screen").style.display="none";
    abrirApp();
  }else{
    errEl.textContent="PIN incorreto. Confere com seu técnico.";
    document.getElementById("pin-input").value="";
    document.getElementById("pin-input").focus();
  }
}
document.addEventListener("DOMContentLoaded",()=>{
  const pinInput=document.getElementById("pin-input");
  if(pinInput)pinInput.addEventListener("keyup",e=>{if(e.key==="Enter")verificarPin()});
});

function abrirApp(){
  document.getElementById("app").style.display="flex";
  document.getElementById("topbar-fazenda-nome").textContent=farmData.propriedade||farmData.produtor||"";
  db.ref("propriedades/"+farmId).on("value",snap=>{
    farmData=snap.val()||farmData;
    if(document.getElementById("screen-dash").classList.contains("active"))renderDashboard();
  });
  db.ref("propriedades/"+farmId+"/produtor_acessos").push({data:new Date().toISOString()}).catch(e=>console.error("Erro ao registrar acesso:",e));
  carregarUltimaVisita();
  renderDashboard();
  sincronizarFilaOffline();
  atualizarBadgeFilaOffline();
}

async function tentarTravarPaisagem(){
  try{
    const elem=document.documentElement;
    if(!document.fullscreenElement&&elem.requestFullscreen){
      await elem.requestFullscreen();
    }
    if(screen.orientation&&screen.orientation.lock){
      await screen.orientation.lock("landscape");
    }
  }catch(e){
    console.log("Não foi possível forçar a orientação automaticamente (normal em alguns navegadores, ex: iPhone) — o aviso de girar manual continua ativo:",e);
  }
}
function liberarOrientacao(){
  try{
    if(screen.orientation&&screen.orientation.unlock)screen.orientation.unlock();
  }catch(e){}
  try{
    if(document.fullscreenElement&&document.exitFullscreen)document.exitFullscreen();
  }catch(e){}
}

function navScreen(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+name).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  const navBtn=document.getElementById("nav-"+name);
  if(navBtn)navBtn.classList.add("active");
  else{
    // secondary screens (consumo, forragem, evolucao, edit) reached via "Mais" — highlight Mais
    if(["consumo","forragem","evolucao","edit","bromatologia","reproducao","recria","meuhistorico"].includes(name)){
      const maisBtn=document.getElementById("nav-mais");
      if(maisBtn)maisBtn.classList.add("active");
    }
  }
  if(["leiteiro","consumo"].includes(name))tentarTravarPaisagem();
  else liberarOrientacao();
  if(name==="dash")renderDashboard();
  if(name==="edit")renderEditForm();
  if(name==="leiteiro")renderLeiteiroScreen();
  if(name==="dieta")renderDietaScreen();
  if(name==="financeiro")renderFinanceiroScreen();
  if(name==="consumo")renderConsumoScreen();
  if(name==="forragem")renderForragemScreen();
  if(name==="evolucao")renderEvolucaoScreen();
  if(name==="mais")renderMaisMenu();
  if(name==="bromatologia")renderBromatologiaScreen();
  if(name==="reproducao")renderReproducaoScreen();
  if(name==="recria")renderRecriaScreen();
  if(name==="meuhistorico")renderMeuHistoricoScreen();
  window.scrollTo(0,0);
}

function renderMaisMenu(){
  const body=document.getElementById("mais-body");
  if(!body)return;
  body.innerHTML=`
    <div style="font-size:17px;font-weight:800;margin-bottom:16px">⋯ Mais</div>
    <button class="btn-action btn-secondary" onclick="navScreen('consumo')">📊 Monitoramento de Consumo</button>
    <button class="btn-action btn-secondary" onclick="navScreen('forragem')">🌾 Forragem: Estoque &amp; Custo</button>
    <button class="btn-action btn-secondary" onclick="navScreen('bromatologia')">🔬 Qualidade da Forragem</button>
    <button class="btn-action btn-secondary" onclick="navScreen('reproducao')">🐄 Eficiência Reprodutiva</button>
    <button class="btn-action btn-secondary" onclick="navScreen('recria')">🐮 Recria</button>
    <button class="btn-action btn-secondary" onclick="navScreen('meuhistorico')">📋 Meu Histórico de Atualizações</button>
    <button class="btn-action btn-secondary" onclick="navScreen('evolucao')">📈 Evolução Mês a Mês</button>
    <button class="btn-action btn-primary" style="margin-top:14px" onclick="navScreen('edit')">✏️ Atualizar Meus Dados</button>
  `;
}

let ultimaVisita=null;
function carregarUltimaVisita(){
  db.ref("visitas/"+farmId).orderByChild("data").limitToLast(1).once("value",snap=>{
    let v=null;
    snap.forEach(child=>{v=child.val()});
    ultimaVisita=v;
    if(document.getElementById("screen-dash").classList.contains("active"))renderDashboard();
  }).catch(e=>console.error("Erro ao carregar última visita:",e));
}

function renderDashboard(){
  const d=farmData||{};
  const body=document.getElementById("dash-body");
  if(!body)return;
  const vacas=parseFloat(d.vacas)||0;
  const secas=parseFloat(d.secas)||0;
  const novilhas=parseFloat(d.novilhas)||0;
  const bezerras=parseFloat(d.bezerras)||0;
  const mediaProd=parseFloat(d.media_prod)||0;
  const del=parseFloat(d.del)||0;
  const gordura=parseFloat(d.gordura)||0;
  const proteina=parseFloat(d.proteina)||0;
  const ccs=parseFloat(d.ccs)||0;
  const nul=parseFloat(d.nul)||0;
  const cbt=parseFloat(d.cbt)||0;

function calcScoreSaude(ccs,mediaProd){
  if(ccs==null&&mediaProd==null)return null;
  let score=100;
  if(ccs!=null){
    if(ccs>400)score-=30;
    else if(ccs>200)score-=15;
  }
  if(mediaProd!=null){
    if(mediaProd<25)score-=20;
    else if(mediaProd>=35)score+=10;
  }
  return Math.max(0,Math.min(100,Math.round(score)));
}

// Tabela de perda por CCS — referência pública consolidada (baseada em Hortet & Seegers 1998
// e material técnico usado amplamente no setor leiteiro brasileiro). Ajustável se a Meta tiver
// uma tabela própria.
function pctPerdaPorCCS(ccs){
  if(ccs==null||ccs<=200)return 0;
  if(ccs<=400)return .06;
  if(ccs<=800)return .09;
  if(ccs<=1600)return .12;
  return .15;
}
// Perda por DEL — 85 mL/dia (ponto médio de 80–90 mL) por dia acima de 180 dias em lactação.
const PERDA_ML_POR_DIA_DEL=85;
const DEL_REFERENCIA_PERDA=180;

async function carregarPerdasOcultas(){
  const wrap=document.getElementById("perdas-ocultas-wrap");
  if(!wrap)return;
  const d=farmData||{};
  const ccs=parseFloat(d.ccs)||null;
  const del=parseFloat(d.del)||null;
  const vacas=parseFloat(d.vacas)||0;
  const mediaProd=parseFloat(d.media_prod)||0;
  if(!vacas||(!ccs&&!del)){wrap.innerHTML="";return}
  let precoLitro=null;
  try{
    const fnSnap=await db.ref("financeiro/"+farmId).once("value");
    const fnData=fnSnap.val()||{};
    const fnDatas=Object.keys(fnData).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();
    if(fnDatas.length)precoLitro=parseFloat(fnData[fnDatas[fnDatas.length-1]].preco_litro)||null;
  }catch(e){console.error("Erro ao buscar preço do litro para estimativa de perdas:",e)}

  const itens=[];
  if(ccs!=null&&mediaProd>0){
    const pct=pctPerdaPorCCS(ccs);
    if(pct>0){
      const litrosDia=mediaProd*vacas*pct;
      itens.push({icone:"🩸",titulo:"Perda estimada por CCS alta ("+ccs.toFixed(0)+"k)",litrosDia});
    }
  }
  if(del!=null&&del>DEL_REFERENCIA_PERDA){
    const litrosDia=(del-DEL_REFERENCIA_PERDA)*(PERDA_ML_POR_DIA_DEL/1000)*vacas;
    itens.push({icone:"📅",titulo:"Perda estimada por DEL acima de "+DEL_REFERENCIA_PERDA+"d",litrosDia});
  }
  if(!itens.length){wrap.innerHTML="";return}
  wrap.innerHTML=`<div class="chart-card" style="background:#fef2f2;border-color:#fecaca;margin-bottom:16px">
    <div style="font-size:11px;font-weight:800;color:#991b1b;text-transform:uppercase;margin-bottom:8px">💸 Perdas Ocultas Estimadas</div>
    ${itens.map(it=>{
      const litrosMes=it.litrosDia*30;
      const valorTxt=precoLitro>0?" · R$ "+(it.litrosDia*precoLitro).toFixed(0)+"/dia (≈R$ "+(litrosMes*precoLitro).toFixed(0)+"/mês)":"";
      return `<div style="padding:6px 0;font-size:12.5px;color:#7f1d1d"><b>${it.icone} ${it.titulo}:</b> ${it.litrosDia.toFixed(1)} L/dia${valorTxt}</div>`;
    }).join("")}
    <div style="font-size:9.5px;color:#991b1b;opacity:.75;margin-top:6px">Estimativa baseada em referência técnica pública — não substitui o diagnóstico do seu técnico.</div>
  </div>`;
}

async function verificarTHIPrevisao(){
  const wrap=document.getElementById("thi-previsao-wrap");
  if(!wrap)return;
  const lat=parseFloat(farmData.lat);
  const lng=parseFloat(farmData.lng);
  if(!lat||!lng){wrap.innerHTML="";return}
  try{
    const url="https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lng+"&daily=temperature_2m_mean,relative_humidity_2m_mean&forecast_days=3&timezone=America%2FSao_Paulo";
    const res=await fetch(url);
    const json=await res.json();
    if(!json||!json.daily||!json.daily.time){wrap.innerHTML="";return}
    let maxThi=0,diaMax="";
    json.daily.time.forEach((dt,i)=>{
      const t=json.daily.temperature_2m_mean[i];
      const rh=json.daily.relative_humidity_2m_mean?json.daily.relative_humidity_2m_mean[i]:null;
      const thi=calcTHI(t,rh);
      if(thi!=null&&thi>maxThi){maxThi=thi;diaMax=dt}
    });
    if(maxThi>=72){
      wrap.innerHTML=`<div class="chart-card" style="background:#fff7ed;border-color:#fdba74;margin-bottom:16px">
        <div style="display:flex;gap:10px;align-items:flex-start">
          <div style="font-size:22px">🌡️</div>
          <div>
            <div style="font-size:12.5px;font-weight:800;color:#9a3412">Estresse térmico previsto — ${new Date(diaMax+"T12:00:00").toLocaleDateString("pt-BR",{weekday:"long"})}</div>
            <div style="font-size:11.5px;color:#9a3412;margin-top:2px">THI previsto de ${maxThi.toFixed(0)} — vale ativar aspersão/ventilação preventivamente antes do calor chegar.</div>
          </div>
        </div>
      </div>`;
    }else{
      wrap.innerHTML="";
    }
  }catch(e){
    console.error("Erro ao buscar previsão de THI:",e);
    wrap.innerHTML="";
  }
}

async function carregarComparativoMensal(){
  const wrap=document.getElementById("comparativo-mensal-wrap");
  if(!wrap)return;
  try{
    const snap=await db.ref("historico/"+farmId).once("value");
    const entradas=[];
    snap.forEach(child=>entradas.push(child.val()));
    const hoje=new Date();
    const mesAtual=hoje.toISOString().slice(0,7);
    const mesPassadoDate=new Date(hoje.getFullYear(),hoje.getMonth()-1,1);
    const mesPassado=mesPassadoDate.toISOString().slice(0,7);
    const porMes={};
    entradas.forEach(e=>{
      if(!e.data||!e.media_prod)return;
      const mes=String(e.data).slice(0,7);
      if(mes!==mesAtual&&mes!==mesPassado)return;
      if(!porMes[mes])porMes[mes]={soma:0,n:0};
      porMes[mes].soma+=parseFloat(e.media_prod);
      porMes[mes].n++;
    });
    const atual=porMes[mesAtual];
    const passado=porMes[mesPassado];
    if(!atual||!passado){wrap.innerHTML="";return}
    const mediaAtual=atual.soma/atual.n;
    const mediaPassada=passado.soma/passado.n;
    const diffPct=mediaPassada>0?(mediaAtual-mediaPassada)/mediaPassada*100:0;
    const cor=diffPct>=0?"#15803d":"#dc2626";
    const seta=diffPct>=0?"↑":"↓";
    wrap.innerHTML=`<div class="chart-card" style="margin-bottom:16px">
      <div class="chart-card-title">📊 Este Mês vs Mês Passado</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:6px">
        <div style="text-align:center"><div style="font-size:20px;font-weight:900">${mediaAtual.toFixed(1)}L</div><div style="font-size:9.5px;color:var(--muted)">Este mês</div></div>
        <div style="font-size:18px;font-weight:900;color:${cor}">${seta} ${Math.abs(diffPct).toFixed(0)}%</div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--muted)">${mediaPassada.toFixed(1)}L</div><div style="font-size:9.5px;color:var(--muted)">Mês passado</div></div>
      </div>
    </div>`;
  }catch(e){
    console.error("Erro ao carregar comparativo mensal:",e);
    wrap.innerHTML="";
  }
}

function abrirEditorMetaPessoal(){
  const atual=parseFloat(farmData.meta_producao_pessoal)||"";

  });

async function carregarAlertasConsolidados(){
  const wrap=document.getElementById("alertas-consolidados-wrap");
  if(!wrap)return;
  const alertas=[];
  try{
    const fnSnap=await db.ref("financeiro/"+farmId).once("value");
    const fnData=fnSnap.val()||{};
    const fnDatas=Object.keys(fnData).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();
    if(fnDatas.length){
      const reg=fnData[fnDatas[fnDatas.length-1]];
      if(reg.receita_bruta_mensal>0){
        if(reg.lucro_mensal<0)alertas.push({icone:"📉",texto:"Prejuízo identificado no mês — fale com seu técnico"});
        else if(reg.rentabilidade_pct!=null&&reg.rentabilidade_pct<10)alertas.push({icone:"💰",texto:"Rentabilidade abaixo de 10% no último cálculo"});
      }
    }
  }catch(e){console.error("Erro ao checar financeiro para alertas:",e)}
  try{
    const fgSnap=await db.ref("forragem/"+farmId).once("value");
    const fgData=fgSnap.val()||{};
    Object.keys(fgData).forEach(k=>{
      const dadosTipo=fgData[k];
      let ultimo=dadosTipo;
      if(!(dadosTipo.tipo||dadosTipo.estoque_ton!=null)){
        const datas=Object.keys(dadosTipo).filter(dk=>/^\d{4}-\d{2}-\d{2}$/.test(dk)).sort();
        ultimo=datas.length?dadosTipo[datas[datas.length-1]]:null;
      }
      if(!ultimo)return;
      const estoqueTon=ultimo.estoque_ton||0;
      const consumoDia=ultimo.consumo_dia_manual||0;
      if(consumoDia>0){
        const dias=estoqueTon*1000/consumoDia;
        if(dias<15)alertas.push({icone:"🌾",texto:"Estoque de "+(ultimo.tipo||"forragem")+" acabando em "+dias.toFixed(0)+" dias"});
      }
    });
  }catch(e){console.error("Erro ao checar forragem para alertas:",e)}
  try{
    const cmSnap=await db.ref("consumo_ms/"+farmId).once("value");
    const porLote=cmSnap.val()||{};
    const cutoff=Date.now()-14*864e5;
    let somaSobra=0,nSobra=0;
    Object.values(porLote).forEach(entradas=>{
      Object.values(entradas||{}).forEach(e=>{
        if(!e.data||new Date(e.data+"T12:00:00").getTime()<cutoff)return;
        if(e.pct_sobra!=null){somaSobra+=e.pct_sobra;nSobra++}
      });
    });
    if(nSobra){
      const media=somaSobra/nSobra;
      if(media>10)alertas.push({icone:"🗑️",texto:"Sobra do cocho alta ("+media.toFixed(1)+"%) — desperdício de dieta"});
      else if(media<2)alertas.push({icone:"⚠️",texto:"Sobra do cocho muito baixa ("+media.toFixed(1)+"%) — risco de restrição alimentar"});
    }
  }catch(e){console.error("Erro ao checar consumo para alertas:",e)}
  if(!alertas.length){wrap.innerHTML="";return}
  wrap.innerHTML=`<div class="chart-card" style="background:#fffbeb;border-color:#fcd34d;margin-bottom:16px">
    <div style="font-size:11px;font-weight:800;color:#92400e;text-transform:uppercase;margin-bottom:8px">⚡ Vale sua atenção</div>
    ${alertas.map(a=>`<div style="display:flex;gap:8px;align-items:flex-start;padding:5px 0;font-size:12.5px;color:#78350f"><span>${a.icone}</span><span>${a.texto}</span></div>`).join("")}
  </div>`;
}

function explicarTermo(termo){
  const explicacoes={
    ccs:"CCS (Contagem de Células Somáticas) mede a saúde da glândula mamária. Quanto menor, melhor — valores altos indicam risco de mastite subclínica.",
    nul:"NUL (Nitrogênio Ureico no Leite) mostra o aproveitamento de proteína da dieta. Faixa ideal costuma ficar entre 12 e 18.",
    cbt:"CBT (Contagem Bacteriana Total) mede a limpeza da ordenha e do resfriamento do leite. Quanto menor, melhor.",
    gordura:"% de gordura do leite — junto com a proteína, define a qualidade do leite entregue e pode influenciar o preço pago.",
    proteina:"% de proteína do leite — indicador de qualidade nutricional e também pode influenciar o preço pago pelo laticínio.",
    del:"DEL (Dias em Lactação) é há quantos dias a vaca pariu. Vacas com DEL muito alto (bem acima de 180-200 dias) já deveriam estar sendo preparadas pra secagem.",
    gmd:"GMD (Ganho Médio Diário) é o quanto o animal está ganhando de peso por dia, em gramas. Ajuda a acompanhar se a recria está indo bem."
  };
  const texto=explicacoes[termo]||"Sem explicação disponível pra esse termo.";
  alert(texto);
}

async function salvarDadosProdutor(){
  const num=id=>{const v=parseFloat(document.getElementById(id)?.value);return isNaN(v)?null:v};
  const vacas=num("pf-vacas");
  const secas=num("pf-secas");
  const mediaProd=num("pf-media-prod");
  const del=num("pf-del");
  const gordura=num("pf-gordura");
  const proteina=num("pf-proteina");
  const ccs=num("pf-ccs");

  const upd={ultima_atualizacao_por:"produtor",atualizado_em:new Date().toISOString()};
  if(vacas!=null){upd.vacas=vacas;upd.lactacao=vacas}
  if(secas!=null)upd.secas=secas;
  if(mediaProd!=null){
    upd.media_prod=mediaProd;
    const vacasParaCalculo=vacas!=null?vacas:(parseFloat(farmData.vacas)||0);
    if(vacasParaCalculo>0)upd.prod_diaria=+(mediaProd*vacasParaCalculo).toFixed(1);
  }
  if(del!=null)upd.del=del;
  if(gordura!=null)upd.gordura=gordura;
  if(proteina!=null)upd.proteina=proteina;
  if(ccs!=null)upd.ccs=ccs;

  const btn=document.getElementById("pf-save-btn");
  btn.disabled=true;
  btn.textContent="Salvando...";

  if(!navigator.onLine){
    guardarNaFilaOffline(upd);
    farmData={...farmData,...upd};
    showToast("📶 Sem internet — salvo no celular, será enviado quando voltar o sinal");
    btn.disabled=false;
    btn.textContent="💾 Salvar Atualização";
    navScreen("dash");
    return;
  }

  try{
    await db.ref("propriedades/"+farmId).update(upd);
    db.ref("propriedades/"+farmId+"/log_atualizacoes").push({data:new Date().toISOString(),campos:upd}).catch(e=>console.error("Erro ao registrar log de atualização:",e));
    farmData={...farmData,...upd};
    showToast("✅ Dados atualizados!");
    navScreen("dash");
  }catch(e){
    console.error("Erro ao salvar, guardando na fila offline:",e);
    guardarNaFilaOffline(upd);
    farmData={...farmData,...upd};
    showToast("📶 Não consegui enviar agora — salvo no celular, tento de novo automaticamente");
    navScreen("dash");
  }finally{
    btn.disabled=false;
    btn.textContent="💾 Salvar Atualização";
  }
}

const FILA_OFFLINE_KEY="meta_produtor_fila_offline";
function guardarNaFilaOffline(upd){
  const fila=JSON.parse(localStorage.getItem(FILA_OFFLINE_KEY)||"[]");
  fila.push({farmId,upd,ts:Date.now()});
  localStorage.setItem(FILA_OFFLINE_KEY,JSON.stringify(fila));
  atualizarBadgeFilaOffline();
}
function atualizarBadgeFilaOffline(){
  const fila=JSON.parse(localStorage.getItem(FILA_OFFLINE_KEY)||"[]").filter(item=>item.farmId===farmId);
  const badge=document.getElementById("fila-offline-badge");
  if(badge)badge.textContent=fila.length?fila.length+" atualização(ões) aguardando envio":"";

async function sincronizarFilaOffline(){
  if(!navigator.onLine)return;
  let fila=JSON.parse(localStorage.getItem(FILA_OFFLINE_KEY)||"[]");
  if(!fila.length)return;
  const restantes=[];
  for(const item of fila){
    try{
      await db.ref("propriedades/"+item.farmId).update(item.upd);
      db.ref("propriedades/"+item.farmId+"/log_atualizacoes").push({data:new Date().toISOString(),campos:item.upd}).catch(e=>console.error("Erro ao registrar log de atualização:",e));
    }catch(e){
      console.error("Erro ao sincronizar item da fila offline:",e);
      restantes.push(item);
    }
  }
  localStorage.setItem(FILA_OFFLINE_KEY,JSON.stringify(restantes));
  atualizarBadgeFilaOffline();
  if(restantes.length<fila.length&&restantes.length===0)showToast("✅ Atualizações pendentes enviadas com sucesso!");
}
window.addEventListener("online",sincronizarFilaOffline);

let chartInstances={};
let TEMP_CACHE={};
function calcTHI(t,rh){if(t==null||rh==null)return null;return(1.8*t+32)-((.55-.0055*rh)*(1.8*t-26))}
async function fetchTemperaturaHistorica(lat,lng,startDate,endDate){
  const cacheKey=lat.toFixed(2)+","+lng.toFixed(2)+","+startDate+","+endDate;
  if(TEMP_CACHE[cacheKey])return TEMP_CACHE[cacheKey];
  try{
    const url="https://archive-api.open-meteo.com/v1/archive?latitude="+lat+"&longitude="+lng+"&start_date="+startDate+"&end_date="+endDate+"&daily=temperature_2m_mean,relative_humidity_2m_mean&timezone=America%2FSao_Paulo";
    const res=await fetch(url);
    const json=await res.json();
    const tempMap={},humidMap={},thiMap={};
    if(json&&json.daily&&json.daily.time){
      json.daily.time.forEach((d,i)=>{
        const t=json.daily.temperature_2m_mean[i];
        const rh=json.daily.relative_humidity_2m_mean?json.daily.relative_humidity_2m_mean[i]:null;
        if(t!=null)tempMap[d]=t;
        if(rh!=null)humidMap[d]=rh;
        const thi=calcTHI(t,rh);
        if(thi!=null)thiMap[d]=thi;
      });
    }
    const result={temp:tempMap,humidity:humidMap,thi:thiMap};
    TEMP_CACHE[cacheKey]=result;
    return result;
  }catch(e){
    console.error("Erro ao buscar dados climáticos:",e);
    return{temp:{},humidity:{},thi:{}};
  }
}
function destroyChart(id){if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id]}}
function mkChart(id,type,data,options){
  destroyChart(id);
  const ctx=document.getElementById(id);
  if(!ctx)return;
  chartInstances[id]=new Chart(ctx,{type,data,options:{responsive:true,maintainAspectRatio:false,...options}});
}

function renderLeiteiroDispersao(dataEscolhida){
  const wrap=document.getElementById("leiteiro-dispersao-wrap");
  if(!wrap||!_leiteiroDataCache)return;
  const {data}=_leiteiroDataCache;
  const registro=data[dataEscolhida];
  const vacas=(registro.vacas||[]).filter(v=>v.litros>0&&v.del>0);
  if(!vacas.length){
    wrap.innerHTML=`<div class="chart-card" style="text-align:center;color:var(--muted);padding:30px 16px">Esse controle (${new Date(dataEscolhida+"T12:00:00").toLocaleDateString("pt-BR")}) não tem dados de produção suficientes pra montar o gráfico.</div>`;
    return;
  }
  const mediaProd=vacas.reduce((s,v)=>s+v.litros,0)/vacas.length;
  const mediaDel=vacas.reduce((s,v)=>s+v.del,0)/vacas.length;
  const lotes=[...new Set(vacas.map(v=>v.lote||1))].sort((a,b)=>a-b);
  const cores=["#15803d","#0891b2","#7c3aed","#d97706","#dc2626","#db2777"];
  const datasets=lotes.map((lote,i)=>({
    label:"Lote "+lote,
    data:vacas.filter(v=>(v.lote||1)===lote).map(v=>({x:v.del,y:v.litros})),
    backgroundColor:cores[i%cores.length]+"cc",
    borderColor:"white",
    borderWidth:1,
    pointRadius:6
  }));
  wrap.innerHTML=`
    <div class="chart-card">
      <div class="chart-card-title">Dispersão — Produção (L) × DEL (dias)</div>
      <div class="chart-card-sub">Controle de ${new Date(dataEscolhida+"T12:00:00").toLocaleDateString("pt-BR")} · ${vacas.length} vacas · média ${mediaProd.toFixed(1)} L · DEL médio ${mediaDel.toFixed(0)}d</div>
      <div style="height:280px"><canvas id="ch-leiteiro-scatter"></canvas></div>
    </div>
  `;
  mkChart("ch-leiteiro-scatter","scatter",{datasets},{
    plugins:{
      legend:{labels:{boxWidth:10,font:{size:10}}},
      tooltip:{callbacks:{label:c=>"DEL "+c.raw.x+" · "+c.raw.y.toFixed(1)+" L"}},
      annotation:{annotations:{
        mediaProdLine:{type:"line",yMin:mediaProd,yMax:mediaProd,borderColor:"#dc2626",borderWidth:1.5,borderDash:[6,4],label:{display:true,content:"Média "+mediaProd.toFixed(1)+"L",color:"#dc2626",font:{size:8,weight:"bold"},position:"end",backgroundColor:"rgba(254,242,242,.9)",padding:{x:4,y:2},borderRadius:4}},
        mediaDelLine:{type:"line",xMin:mediaDel,xMax:mediaDel,borderColor:"#7c3aed",borderWidth:1.5,borderDash:[6,4],label:{display:true,content:"DEL médio "+mediaDel.toFixed(0)+"d",color:"#7c3aed",font:{size:8,weight:"bold"},position:"start",backgroundColor:"rgba(245,243,255,.9)",padding:{x:4,y:2},borderRadius:4}}
      }}
    },
    scales:{
      x:{title:{display:true,text:"DEL (dias)",font:{size:10}}},
      y:{title:{display:true,text:"Litros/dia",font:{size:10}}}
    }
  });
}

function renderLeiteiroEvolucao(){
  const wrap=document.getElementById("leiteiro-evolucao-wrap");
  if(!wrap||!_leiteiroDataCache)return;
  const {data,datas}=_leiteiroDataCache;
  if(datas.length<2){wrap.innerHTML="";return}
  const pontos=datas.map(dt=>{
    const reg=data[dt];
    const comLeite=(reg.vacas||[]).filter(v=>v.litros>0);
    const comDel=(reg.vacas||[]).filter(v=>v.del>0);
    return{
      data:dt,
      media:comLeite.length?comLeite.reduce((s,v)=>s+v.litros,0)/comLeite.length:null,
      delMedio:comDel.length?comDel.reduce((s,v)=>s+v.del,0)/comDel.length:null
    };
  });
  const labels=pontos.map(p=>new Date(p.data+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}));
  wrap.innerHTML=`
    <div class="chart-card">
      <div class="chart-card-title">Evolução do Leite nos Controles</div>
      <div class="chart-card-sub">Média de produção e DEL médio a cada controle registrado</div>
      <div style="height:240px"><canvas id="ch-leiteiro-evolucao"></canvas></div>
    </div>
  `;
  mkChart("ch-leiteiro-evolucao","line",{
    labels,
    datasets:[
      {label:"Produção Média (L)",data:pontos.map(p=>p.media!=null?+p.media.toFixed(1):null),borderColor:"#15803d",backgroundColor:"rgba(21,128,61,.08)",borderWidth:2.5,tension:.3,pointRadius:5,spanGaps:true,yAxisID:"y"},
      {label:"DEL Médio",data:pontos.map(p=>p.delMedio!=null?+p.delMedio.toFixed(0):null),borderColor:"#b45309",backgroundColor:"rgba(180,83,9,.08)",borderWidth:2.5,borderDash:[6,3],tension:.3,pointRadius:5,spanGaps:true,yAxisID:"y1"}
    ]
  },{
    plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}},
    scales:{
      y:{position:"left",title:{display:true,text:"Litros/dia",font:{size:9}}},
      y1:{position:"right",title:{display:true,text:"DEL (dias)",font:{size:9}},grid:{display:false}}
    }
  });
}

async function renderLeiteiroTHI(){
  const wrap=document.getElementById("thi-wrap");
  if(!wrap||!_leiteiroDataCache)return;
  const {data,datas}=_leiteiroDataCache;
  const lat=parseFloat(farmData.lat);
  const lng=parseFloat(farmData.lng);
  if(!lat||!lng){wrap.innerHTML="";return}
  wrap.innerHTML=`<div class="chart-card" id="thi-card">
    <div class="chart-card-title">Produção × THI (Índice de Temperatura e Umidade)</div>
    <div class="chart-card-sub" id="thi-sub">Calculando...</div>
    <div style="height:260px"><canvas id="ch-leiteiro-thi"></canvas></div>
  </div>`;
  try{
    const porData={};
    datas.forEach(dt=>{
      const reg=data[dt];
      const comLeite=(reg.vacas||[]).filter(v=>v.litros>0);
      if(comLeite.length)porData[dt]=comLeite.reduce((s,v)=>s+v.litros,0)/comLeite.length;
    });
    const datasComProd=Object.keys(porData).sort();
    if(datasComProd.length>=3){
      const clima=await fetchTemperaturaHistorica(lat,lng,datasComProd[0],datasComProd[datasComProd.length-1]);
      const labels=datasComProd.map(d=>new Date(d+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}));
      const prodVals=datasComProd.map(d=>+porData[d].toFixed(1));
      const thiVals=datasComProd.map(d=>clima.thi[d]!=null?+clima.thi[d].toFixed(1):null);
      const thiValidos=thiVals.filter(v=>v!=null);
      const diasCriticos=thiValidos.filter(v=>v>=72).length;
      const subEl=document.getElementById("thi-sub");
      if(subEl)subEl.textContent=thiValidos.length?diasCriticos+" dia(s) em estresse térmico (THI≥72) nos controles do período":"Sem dado climático disponível pro período";
      mkChart("ch-leiteiro-thi","line",{
        labels,
        datasets:[
          {label:"Produção Média (L)",data:prodVals,borderColor:"#2563eb",backgroundColor:"rgba(37,99,235,.08)",borderWidth:2,tension:.3,yAxisID:"y"},
          {label:"THI",data:thiVals,borderColor:"#dc2626",backgroundColor:"rgba(220,38,38,.06)",borderWidth:2,borderDash:[4,2],tension:.3,spanGaps:true,yAxisID:"y1"}
        ]
      },{
        plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}},
        scales:{
          y:{position:"left",title:{display:true,text:"Produção (L)",font:{size:9}}},
          y1:{position:"right",title:{display:true,text:"THI",font:{size:9}},grid:{display:false}}
        }
      });
    }else{
      const thiCard=document.getElementById("thi-card");
      if(thiCard)thiCard.innerHTML=`<div style="text-align:center;color:var(--muted);padding:20px 0;font-size:12px">Precisa de pelo menos 3 controles em datas diferentes pra montar esse gráfico.</div>`;
    }
  }catch(e2){
    console.error("Erro ao montar gráfico de THI:",e2);
    const thiCard=document.getElementById("thi-card");
    if(thiCard)thiCard.innerHTML=`<div style="text-align:center;color:#dc2626;padding:20px 0;font-size:12px">Erro ao buscar dados climáticos.</div>`;
  }
}

async function renderConsumoScreen(){
  const body=document.getElementById("consumo-body");

  `;
  try{

    const cutoff=Date.now()-60*864e5;
    const porData={};
    Object.values(porLote).forEach(entradas=>{
      Object.values(entradas||{}).forEach(e=>{
        if(!e.data||new Date(e.data+"T12:00:00").getTime()<cutoff)return;

        const msVal=e.ms_total_animal!=null?e.ms_total_animal:e.ms_ingerida_animal;
        if(msVal!=null){porData[e.data].somaMs+=msVal;porData[e.data].nMs++}
      });
    });
    const datas=Object.keys(porData).sort();
    const cont=document.getElementById("consumo-content");
    if(!datas.length){
      cont.innerHTML=`<div class="chart-card" style="text-align:center;color:var(--muted);padding:30px 16px">Nenhum lançamento de consumo nos últimos 60 dias.</div>`;
      return;
    }
    const sobraVals=datas.map(d=>porData[d].nSobra?porData[d].somaSobra/porData[d].nSobra:null);
    const msVals=datas.map(d=>porData[d].nMs?porData[d].somaMs/porData[d].nMs:null);
    const sobraValidos=sobraVals.filter(v=>v!=null);
    const msValidos=msVals.filter(v=>v!=null);
    const avgSobra=sobraValidos.length?sobraValidos.reduce((a,b)=>a+b,0)/sobraValidos.length:0;
    const avgMs=msValidos.length?msValidos.reduce((a,b)=>a+b,0)/msValidos.length:0;
    const labels=datas.map(d=>new Date(d+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}));
    cont.innerHTML=`
      <div class="chart-card">
        <div class="chart-card-title">Resumo da Fazenda — Todos os Lotes</div>
        <div class="chart-card-sub">% Sobra média: <b style="color:#d97706">${avgSobra.toFixed(1)}%</b> · MS/Animal média: <b style="color:#15803d">${avgMs.toFixed(1)} kg</b></div>
        <div style="height:260px"><canvas id="ch-consumo"></canvas></div>
      </div>
    `;
    mkChart("ch-consumo","line",{
      labels,
      datasets:[
        {label:"% Sobra",data:sobraVals,borderColor:"#d97706",backgroundColor:"rgba(217,119,6,.08)",borderWidth:2,tension:.3,spanGaps:true,yAxisID:"y"},
        {label:"MS Ingerida/Animal (kg)",data:msVals,borderColor:"#15803d",backgroundColor:"rgba(21,128,61,.08)",borderWidth:2,tension:.3,spanGaps:true,yAxisID:"y1"}
      ]
    },{
      plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}},
      scales:{
        y:{position:"left",title:{display:true,text:"% Sobra",font:{size:9}}},
        y1:{position:"right",title:{display:true,text:"MS kg/animal",font:{size:9}},grid:{display:false}}

async function renderEvolucaoScreen(){
  const body=document.getElementById("evolucao-body");
  if(!body)return;
  body.innerHTML=`
    <div style="font-size:17px;font-weight:800;margin-bottom:4px">📈 Evolução Mês a Mês</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Histórico de produção e qualidade do leite ao longo do tempo</div>
    <div id="evolucao-content"><div style="text-align:center;padding:40px"><div class="mg-spinner"></div></div></div>
  `;
  try{
    const snap=await db.ref("historico/"+farmId).once("value");
    const entradas=[];
    snap.forEach(child=>entradas.push(child.val()));
    const cont=document.getElementById("evolucao-content");
    if(entradas.length<2){
      cont.innerHTML=`<div class="chart-card" style="text-align:center;color:var(--muted);padding:30px 16px">Ainda não há histórico suficiente (precisa de pelo menos 2 registros em datas diferentes).</div>`;
      return;
    }
    const porMes={};
    entradas.forEach(e=>{
      if(!e.data)return;
      const mes=String(e.data).slice(0,7);
      if(!/^\d{4}-\d{2}$/.test(mes))return;
      if(!porMes[mes])porMes[mes]={somaProd:0,nProd:0,somaGord:0,nGord:0,somaProt:0,nProt:0};
      if(e.media_prod>0){porMes[mes].somaProd+=parseFloat(e.media_prod);porMes[mes].nProd++}
      if(e.gordura>0){porMes[mes].somaGord+=parseFloat(e.gordura);porMes[mes].nGord++}
      if(e.proteina>0){porMes[mes].somaProt+=parseFloat(e.proteina);porMes[mes].nProt++}
    });
    const meses=Object.keys(porMes).sort();
    if(meses.length<2){
      cont.innerHTML=`<div class="chart-card" style="text-align:center;color:var(--muted);padding:30px 16px">Ainda não há registros em pelo menos 2 meses diferentes.</div>`;
      return;
    }
    const nomesMes=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
    const labels=meses.map(m=>nomesMes[parseInt(m.slice(5,7),10)-1]+"/"+m.slice(2,4));
    const prodData=meses.map(m=>porMes[m].nProd?+(porMes[m].somaProd/porMes[m].nProd).toFixed(1):null);
    const gordData=meses.map(m=>porMes[m].nGord?+(porMes[m].somaGord/porMes[m].nGord).toFixed(2):null);
    const protData=meses.map(m=>porMes[m].nProt?+(porMes[m].somaProt/porMes[m].nProt).toFixed(2):null);
    cont.innerHTML=`
      <div class="chart-card">
        <div class="chart-card-title">Produção Média (L/vaca/dia)</div>
        <div class="chart-card-sub">Média mensal, mês a mês</div>
        <div style="height:220px"><canvas id="ch-evol-prod"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">Qualidade do Leite</div>
        <div class="chart-card-sub">Gordura e proteína médias, mês a mês</div>
        <div style="height:220px"><canvas id="ch-evol-qual"></canvas></div>
      </div>
    `;
    mkChart("ch-evol-prod","bar",{
      labels,
      datasets:[{label:"L/vaca/dia",data:prodData,backgroundColor:"#15803d",borderRadius:5}]
    },{plugins:{legend:{display:false}}});
    mkChart("ch-evol-qual","line",{
      labels,
      datasets:[
        {label:"Gordura %",data:gordData,borderColor:"#b45309",backgroundColor:"rgba(180,83,9,.06)",borderWidth:2,pointRadius:4,tension:.3,spanGaps:true},
        {label:"Proteína %",data:protData,borderColor:"#1d4ed8",backgroundColor:"rgba(29,78,216,.06)",borderWidth:2,pointRadius:4,tension:.3,spanGaps:true}
      ]
    },{plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}}});
  }catch(e){
    console.error("Erro ao carregar evolução:",e);
    document.getElementById("evolucao-content").innerHTML=`<div class="chart-card" style="text-align:center;color:#dc2626">Erro ao carregar dados.</div>`;
  }
}

// ═══ FORRAGEM: ESTOQUE & CUSTO ═══
async function renderForragemScreen(){
  const body=document.getElementById("forragem-body");
  if(!body)return;
  body.innerHTML=`
    <div style="font-size:17px;font-weight:800;margin-bottom:4px">🌾 Forragem: Estoque &amp; Custo</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Quanto tempo de estoque resta e quanto custou produzir</div>
    <div id="forragem-content"><div style="text-align:center;padding:40px"><div class="mg-spinner"></div></div></div>
  `;
  try{
    const snap=await db.ref("forragem/"+farmId).once("value");
    const bruto=snap.val()||{};
    const tipos=Object.keys(bruto).map(k=>{
      const dadosTipo=bruto[k];
      if(dadosTipo.tipo||dadosTipo.custo_total!=null||dadosTipo.estoque_ton!=null)return dadosTipo;
      const datas=Object.keys(dadosTipo).filter(dk=>/^\d{4}-\d{2}-\d{2}$/.test(dk)).sort();
      return datas.length?dadosTipo[datas[datas.length-1]]:null;
    }).filter(Boolean);
    const cont=document.getElementById("forragem-content");
    if(!tipos.length){
      cont.innerHTML=`<div class="chart-card" style="text-align:center;color:var(--muted);padding:30px 16px">Nenhum registro de forragem ainda pra essa fazenda.</div>`;
      return;
    }
    cont.innerHTML=tipos.map(t=>{
      const estoqueTon=t.estoque_ton||0;
      const consumoDia=t.consumo_dia_manual||0;
      const dias=consumoDia>0?estoqueTon*1000/consumoDia:null;
      const cor=dias==null?"#64748b":dias>=60?"#15803d":dias>=30?"#d97706":"#dc2626";
      return `<div class="chart-card">
        <div class="chart-card-title">${t.tipo||"Forragem"}</div>
        <div class="kpi-grid" style="margin-top:10px;margin-bottom:0">
          <div class="kpi-card" style="--kpi-color:#0891b2"><div class="kpi-icon">📦</div><div class="kpi-val">${estoqueTon.toFixed(0)}</div><div class="kpi-lbl">Toneladas em estoque</div></div>
          <div class="kpi-card" style="--kpi-color:${cor}"><div class="kpi-icon">📅</div><div class="kpi-val">${dias!=null?dias.toFixed(0):"—"}</div><div class="kpi-lbl">Dias de autonomia</div></div>
        </div>
        ${t.custo_por_ton_ms>0?`<div style="margin-top:10px;font-size:12.5px;color:var(--muted)">Custo de produção: <b style="color:var(--text)">R$ ${t.custo_por_ton_ms.toFixed(2)}/ton MS</b></div>`:""}
      </div>`;
    }).join("");
  }catch(e){
    console.error("Erro ao carregar forragem:",e);
    document.getElementById("forragem-content").innerHTML=`<div class="chart-card" style="text-align:center;color:#dc2626">Erro ao carregar dados.</div>`;
  }
}

// ═══ RECRIA ═══
function calcGmdAnimalSimples(a){
  const pesagens=Object.values(a.pesagens||{}).sort((x,y)=>(x.data||"")>(y.data||"")?1:-1);
  const ultima=pesagens[pesagens.length-1];
  const pesoAtual=ultima?ultima.peso:a.peso_nascimento;
  const diasVida=a.nascimento?Math.floor((Date.now()-new Date(a.nascimento+"T12:00:00").getTime())/864e5):0;
  const gmdGeral=diasVida>0&&pesoAtual!=null&&a.peso_nascimento!=null?(pesoAtual-a.peso_nascimento)/diasVida*1000:null;
  return{gmdGeral,pesoAtual};
}
let _recriaAnimaisCache={};
async function renderRecriaScreen(){
  const body=document.getElementById("recria-body");
  if(!body)return;
  body.innerHTML=`
    <div style="font-size:17px;font-weight:800;margin-bottom:4px">🐮 Recria</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Ganho de peso das novilhas em recria</div>
    <button class="btn-action btn-secondary" onclick="toggleFormRecria()">➕ Lançar Animal ou Pesagem</button>
    <div id="form-recria-wrap" style="display:none;margin-bottom:14px"></div>
    <div id="recria-content"><div style="text-align:center;padding:40px"><div class="mg-spinner"></div></div></div>
  `;
  try{
    const snap=await db.ref("recria/"+farmId).once("value");
    const bruto=snap.val()||{};
    _recriaAnimaisCache=bruto;
    const animaisEntries=Object.entries(bruto).filter(([id,a])=>a&&a.status!=="encerrado");
    const cont=document.getElementById("recria-content");
    if(!animaisEntries.length){
      cont.innerHTML=`<div class="chart-card" style="text-align:center;color:var(--muted);padding:30px 16px">Nenhum animal em recria registrado ainda. Toque em "Lançar Animal ou Pesagem" acima pra começar.</div>`;
      return;
    }
    const comGmd=animaisEntries.map(([id,a])=>calcGmdAnimalSimples(a)).filter(r=>r.gmdGeral!=null);
    const gmdMedio=comGmd.length?comGmd.reduce((s,r)=>s+r.gmdGeral,0)/comGmd.length:null;
    const gmdCor=gmdMedio==null?"#64748b":gmdMedio>=750?"#15803d":gmdMedio>=600?"#d97706":"#dc2626";
    cont.innerHTML=`
      <div class="kpi-grid">
        <div class="kpi-card" style="--kpi-color:#0891b2">
          <div class="kpi-icon">🐮</div>
          <div class="kpi-val">${animaisEntries.length}</div>
          <div class="kpi-lbl">Animais em recria</div>
        </div>
        <div class="kpi-card" style="--kpi-color:${gmdCor}">
          <div class="kpi-icon">⚖️</div>
          <div class="kpi-val">${gmdMedio!=null?gmdMedio.toFixed(0):"—"}</div>
          <div class="kpi-lbl">GMD médio (g/dia) <span onclick="explicarTermo('gmd')" style="cursor:pointer;color:#93c5fd">ⓘ</span></div>
        </div>
      </div>
      <div class="chart-card" style="text-align:center;color:var(--muted);font-size:11.5px;margin-bottom:14px">Meta de referência: 700–800 g/dia</div>
      <div class="chart-card">
        <div class="chart-card-title">Animais</div>
        ${animaisEntries.map(([id,a])=>{
          const r=calcGmdAnimalSimples(a);
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f1f5f9">
            <div style="font-size:12.5px;font-weight:600">${a.numero||"?"}</div>
            <div style="font-size:11.5px;color:var(--muted)">${r.pesoAtual!=null?r.pesoAtual.toFixed(0)+"kg":"—"}${r.gmdGeral!=null?" · GMD "+r.gmdGeral.toFixed(0)+"g/d":""}</div>
          </div>`;
        }).join("")}
      </div>
    `;
  }catch(e){
    console.error("Erro ao carregar recria:",e);
    document.getElementById("recria-content").innerHTML=`<div class="chart-card" style="text-align:center;color:#dc2626">Erro ao carregar dados.</div>`;
  }
}

function toggleFormRecria(){
  const wrap=document.getElementById("form-recria-wrap");
  if(!wrap)return;
  const abrindo=wrap.style.display==="none";
  wrap.style.display=abrindo?"block":"none";
  if(abrindo)renderFormRecria();
}

function renderFormRecria(){
  const wrap=document.getElementById("form-recria-wrap");
  if(!wrap)return;
  wrap.innerHTML=`
    <div class="chart-card">
      <div class="form-label">Tipo de lançamento</div>
      <select class="form-input" id="rec-tipo" onchange="atualizarFormRecriaTipo()" style="margin-bottom:12px">
        <option value="pesagem">⚖️ Pesagem de animal existente</option>
        <option value="novo">🐮 Novo animal (entrada na recria)</option>
      </select>
      <div id="rec-campos-dinamicos"></div>
      <button class="btn-action btn-primary" style="margin-top:12px" onclick="salvarLancamentoRecria()">💾 Salvar</button>
    </div>
  `;
  atualizarFormRecriaTipo();
}

function atualizarFormRecriaTipo(){
  const tipo=document.getElementById("rec-tipo")?.value||"pesagem";
  const wrap=document.getElementById("rec-campos-dinamicos");
  if(!wrap)return;
  const hoje=new Date().toISOString().slice(0,10);
  if(tipo==="pesagem"){
    const animaisEntries=Object.entries(_recriaAnimaisCache).filter(([id,a])=>a&&a.status!=="encerrado");
    if(!animaisEntries.length){
      wrap.innerHTML=`<div style="font-size:12px;color:var(--muted);padding:8px 0">Nenhum animal cadastrado ainda — lance um "Novo animal" primeiro.</div>`;
      return;
    }
    wrap.innerHTML=`
      <div class="form-field"><label class="form-label">Animal</label>
        <select class="form-input" id="rec-animal-sel">
          ${animaisEntries.map(([id,a])=>`<option value="${id}">${a.numero||"?"}</option>`).join("")}
        </select>
      </div>
      <div class="form-field"><label class="form-label">Data da pesagem</label><input type="date" class="form-input" id="rec-pesagem-data" value="${hoje}"></div>
      <div class="form-field"><label class="form-label">Peso (kg)</label><input type="number" step="0.1" class="form-input" id="rec-pesagem-peso" placeholder="Ex: 145"></div>
    `;
  }else{
    wrap.innerHTML=`
      <div class="form-field"><label class="form-label">Número/identificação do animal</label><input type="text" class="form-input" id="rec-novo-numero" placeholder="Ex: 512"></div>
      <div class="form-field"><label class="form-label">Data de nascimento</label><input type="date" class="form-input" id="rec-novo-nascimento" value="${hoje}"></div>
      <div class="form-field"><label class="form-label">Peso ao nascer (kg)</label><input type="number" step="0.1" class="form-input" id="rec-novo-peso" placeholder="Ex: 38"></div>
    `;
  }
}

async function salvarLancamentoRecria(){
  const tipo=document.getElementById("rec-tipo")?.value||"pesagem";
  try{
    if(tipo==="pesagem"){
      const animalId=document.getElementById("rec-animal-sel")?.value;
      const data=document.getElementById("rec-pesagem-data")?.value;
      const peso=parseFloat(document.getElementById("rec-pesagem-peso")?.value);
      if(!animalId||!data||isNaN(peso)||peso<=0){showToast("❌ Preencha animal, data e peso",true);return}
      await db.ref("recria/"+farmId+"/"+animalId+"/pesagens").push({data,peso});
      showToast("✅ Pesagem lançada!");
    }else{
      const numero=document.getElementById("rec-novo-numero")?.value.trim();
      const nascimento=document.getElementById("rec-novo-nascimento")?.value;
      const pesoNasc=parseFloat(document.getElementById("rec-novo-peso")?.value);
      if(!numero||!nascimento||isNaN(pesoNasc)||pesoNasc<=0){showToast("❌ Preencha número, nascimento e peso",true);return}
      await db.ref("recria/"+farmId).push({numero,nascimento,peso_nascimento:pesoNasc,status:"ativo",origem:"produtor"});
      showToast("✅ Animal cadastrado na recria!");
    }
    document.getElementById("form-recria-wrap").style.display="none";
    renderRecriaScreen();
  }catch(e){
    console.error("Erro ao salvar lançamento de recria:",e);
    showToast("❌ Erro ao salvar: "+e.message,true);
  }
}

iniciar();
