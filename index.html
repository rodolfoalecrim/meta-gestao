<title>Meta Gestão</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #003c09, #1a6b35);
  font-family: 'Inter', sans-serif;
  color: white;
}
.box {
  text-align: center;
  padding: 48px;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
}
h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
p { opacity: .75; margin-bottom: 24px; }
a {
  display: inline-block;
  background: white;
  color: #003c09;
  font-weight: 700;
  padding: 14px 32px;
  border-radius: 10px;
  text-decoration: none;
}
</style>
</head>
<body>
<div class="box">
  <h1>🌿 Meta Gestão</h1>
  <p>Redirecionando...</p>
